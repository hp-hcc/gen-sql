services:
  sql-generator-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sql-generator-service
    ports:
      - "8111:8111"
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8111/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
